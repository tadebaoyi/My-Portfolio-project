<!DOCTYPE html>
<html>
<body>

<h1>Demo External JavaScript</h1>

<p id="demo"> A Paragraph</p>


<button type="button" onclick="myFunction()">Change Content</button>

<button type="button" onclick="myFunction1()">Change Font Colour</button>

<button type="button" onclick="myFunction()">Change Font Type</button>

<script>
function myFunction() {
  document.getElementById("demo").innerHTML = "Paragraph changed.";
}

function myFunction1() {
  document.getElementById("demo").innerHTML = "<p style="color:Tomato;">Paragraph changed</p>";
}
</script>

<script src="myScript.js"></script>

</body>
</html>
